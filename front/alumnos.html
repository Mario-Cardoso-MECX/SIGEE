<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Alumnos</title>

    <script src="js/auth-guard.js"></script>

    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/alumnos.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="dashboard-wrapper">
        <main class="main-content">
            <header class="top-bar">
                <div class="header-title">
                    <h1><i class="fas fa-users-cog"></i>Alumnos</h1>
                </div>
                <div class="user-badge">
                    <i class="fas fa-user-circle"></i>
                    <span id="nombreUsuarioSaludo">Cargando...</span>
                </div>
            </header>

            <div class="card-accion">
                <div class="card-header">
                    <h2><i class="fas fa-user-plus"></i> Registrar Nuevo Alumno</h2>
                </div>
                <form id="formNuevoAlumno" onsubmit="event.preventDefault(); registrarAlumno();">
                    
                    <input type="hidden" id="txtIdAlumno" value="">

                    <div class="form-grid">
                        <div class="form-group">
                            <label><i class="fas fa-signature"></i> Nombre(s):</label>
                            <input type="text" id="nombreAlumno" class="input-grande" placeholder="Ej: Juan" 
                                pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+$" title="Solo se permiten letras" required>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-signature"></i> Apellidos:</label>
                            <input type="text" id="apellidoAlumno" class="input-grande" placeholder="Ej: Pérez López" 
                                pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ ]+$" title="Solo se permiten letras" required>
                        </div>
                        
                        <div class="form-group">
                            <label><i class="fas fa-graduation-cap"></i> Grado:</label>
                            <select id="gradoAlumno" class="input-grande" required>
                                <option value="">Selecciona Grado</option>
                                <option value="1°">1° Primero</option>
                                <option value="2°">2° Segundo</option>
                                <option value="3°">3° Tercero</option>
                                <option value="4°">4° Cuarto</option>
                                <option value="5°">5° Quinto</option>
                                <option value="6°">6° Sexto</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-users"></i> Grupo:</label>
                            <select id="grupoLetra" class="input-grande" required>
                                <option value="">Selecciona Grupo</option>
                                <option value="A">A</option>
                                <option value="B">B</option>
                                <option value="C">C</option>
                            </select>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-verde">
                        <i class="fas fa-id-card"></i> Registrar y Generar Matrícula
                    </button>
                </form>
                <div id="resultadoRegistro" class="resultado-msg"></div>
            </div>

            <div class="search-container" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">
                <div class="input-wrapper" style="flex: 1; min-width: 250px;">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="txtFiltrarAlumnos" class="input-grande" 
                        placeholder="Buscar por nombre o matrícula...">
                </div>
                
                <button id="btnPromocion" style="width: auto; margin: 0; background-color: #2c3e50; color: white; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1);" onmouseover="this.style.backgroundColor='#1a252f'; this.style.transform='translateY(-2px)';" onmouseout="this.style.backgroundColor='#2c3e50'; this.style.transform='translateY(0)';" onclick="promoverCicloEscolar()">
                    <i class="fas fa-user-graduate"></i> Cierre de Ciclo
                </button>
            </div>

            <div class="tabla-container">
                <table id="tablaAlumnos">
                    <thead>
                        <tr>
                            <th><i class="fas fa-hashtag"></i> Matrícula</th>
                            <th><i class="fas fa-user"></i> Nombre Completo</th>
                            <th><i class="fas fa-graduation-cap"></i> Grupo</th>
                            <th><i class="fas fa-tools"></i> Acciones</th> 
                        </tr>
                    </thead>
                    <tbody id="tablaAlumnosBody">
                        <tr>
                            <td colspan="4">
                                <i class="fas fa-spinner fa-spin"></i> Cargando alumnos...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://kit.fontawesome.com/e2dc84faef.js" crossorigin="anonymous"></script>
    <script src="js/config.js"></script>
    <script src="js/ui-constructor.js"></script>
    <script src="js/alumnos.js"></script>
    <script src="js/saludoUsuario.js"></script>
</body>
</html>
